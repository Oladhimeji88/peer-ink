name: mobile_app
description: SNAPLINK mobile capture and transfer app.
publish_to: none
version: 0.1.0

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  camera: ^0.11.0
  core_protocol:
    path: ../../packages/core_protocol
  device_security:
    path: ../../packages/device_security
  flutter_hooks: ^0.20.5
  flutter_riverpod: ^2.5.1
  go_router: ^14.1.4
  hooks_riverpod: ^2.5.1
  local_discovery:
    path: ../../packages/local_discovery
  mobile_scanner: ^5.1.1
  path: ^1.9.0
  permission_handler: ^11.3.1
  shared_preferences: ^2.2.3
  shared_ui:
    path: ../../packages/shared_ui
  transfer_engine:
    path: ../../packages/transfer_engine

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  mocktail: ^1.0.3

flutter:
  uses-material-design: true

