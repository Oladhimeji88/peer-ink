name: windows_app
description: SNAPLINK Windows desktop companion app.
publish_to: none
version: 0.1.0

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  collection: ^1.18.0
  core_protocol:
    path: ../../packages/core_protocol
  device_security:
    path: ../../packages/device_security
  flutter_hooks: ^0.20.5
  flutter_riverpod: ^2.5.1
  go_router: ^14.1.4
  hooks_riverpod: ^2.5.1
  path: ^1.9.0
  path_provider: ^2.1.3
  qr_flutter: ^4.1.0
  shared_preferences: ^2.2.3
  shared_ui:
    path: ../../packages/shared_ui
  transfer_engine:
    path: ../../packages/transfer_engine
  window_manager: ^0.3.9

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.3

flutter:
  uses-material-design: true

